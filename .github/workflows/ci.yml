name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-type-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff
        run: ruff check vertai/ tests/

      - name: Mypy (strict)
        run: mypy --strict vertai/

      - name: Build (twine check)
        run: |
          pip install build twine
          python -m build
          twine check dist/*

      - name: Unit tests
        run: pytest tests/ -v --tb=short --cov=vertai --cov-report=term-missing

      - name: Integration tests (real API, optional)
        if: ${{ env.VERTAI_API_KEY != '' }}
        env:
          VERTAI_API_KEY: ${{ secrets.VERTAI_API_KEY }}
        run: pytest tests/test_deepseek_integration.py -v --tb=short
        continue-on-error: true  # integration is best-effort; flakes in upstream API do not fail CI

  coverage-gate:
    # Run on a single Python version to enforce a coverage floor on critical paths.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
      # Coverage policy (ROADMAP): enforce floors on critical-path modules with no
      # heavy optional deps (pure logic / core abstractions), not a single global
      # line number. Modules needing whisper/torch/chromadb/faiss or a real API key
      # have their integration tests honestly skipped in this lightweight runner,
      # so a global floor would measure dependency availability, not test quality.
      - name: Coverage floors on critical modules
        run: |
          pytest tests/ \
            --cov=vertai.core.agent \
            --cov=vertai.core.callbacks \
            --cov=vertai.core.memory \
            --cov=vertai.core.text_splitter \
            --cov=vertai.core.retriever \
            --cov=vertai.core.tool \
            --cov=vertai.core.tools.calculator \
            --cov=vertai.core.tools.file \
            --cov=vertai.output.structured \
            --cov=vertai.output.docgen \
            --cov=vertai.scenarios.knowledge_qa \
            --cov=vertai.scenarios.reviewer \
            --cov=vertai.workflow.workflow \
            --cov=vertai.data.parser \
            --cov-report=term-missing \
            --cov-fail-under=92
      - name: Global coverage report (informational, no gate)
        run: |
          pytest tests/ --cov=vertai --cov-report=term -q 2>&1 | tail -5 || true
